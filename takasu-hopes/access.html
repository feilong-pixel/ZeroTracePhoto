      <p>高洲ホープスでは、子供の体力や技術力に応じてバンビ・ビギナー・レギュラーの3つのクラスに分けて練習を進めています。</p>
      <p>バンビクラスは、幼稚園児が対象の身体を動かしながら運動を楽しむクラスとなっております。</p>
